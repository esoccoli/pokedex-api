<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let method = 'get';
        const handleResponse = async (response, parseResponse) =>
        {
            const content = document.querySelector('#content');

            // Displays the appropriate message based on the status code of the response
            switch (response.status)
            {
                case 200:
                    content.innerHTML = `<b>Success</b>`;
                    break;
                case 201:
                    content.innerHTML = `<b>Created</b>`;
                    break;
                case 204:
                    content.innerHTML = `<b>Updated (No Content)</b>`;
                    return;
                case 400:
                    content.innerHTML = `<b>Bad Request</b>`;
                    break;
                case 404:
                    content.innerHTML = `<b>Not Found</b>`;
                    break;
                default:
                    content.innerHTML = `Error code not implemented by client.`;
                    break;
            }

            if (parseResponse)
            {
                let obj = await response.json();

                let jsonString = JSON.stringify(obj);
                content.innerHTML += `<p>${jsonString}</p>`;
            }
            else
            {
                content.innerHTML += '<p>Metadata Received</p>';
            }

        };

        const sendRequest = async (form) =>
        {
            url = form.querySelector('#urlField').value;
            method = form.querySelector('#methodSelect').value;

            let response;

            let formData = `?id=${idField.value}`;
            if (url === '/updateName')
            {
                formData += `&name=${nameField.value}`;
            }
            else if (url === '/updateImage')
            {
                formData += `&img=${imgField.value}`;
            }
            else if (url === '/addType' || url === '/updateType')
            {
                formData += `&type=${typeField.value}`;
            }
            else if (url === '/updateHeight')
            {
                formData += `&height=${heightField.value}`;
            }
            else if (url === '/updateWeight')
            {
                formData += `&weight=${weightField.value}`;
            }
            else if (url === '/addWeakness' || url === '/updateWeaknesses')
            {
                formData += `&weakness=${weaknessField.value}`;
            }
            else if (url === 'addPokemon')
            {
                formData += `&num=${numField.value}&name=${nameField.value}&img=${imgField.value}&type=${typeField.value}`;
                formData += `&height=${heightField.value}&weight=${weightField.value}&weakness=${weaknessField.value}`;
            }

            if (method !== 'post')
            {
                response = await fetch(url, {
                    method,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                handleResponse(response, method === 'get');
            }
            else
            {
                response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Accept': 'application/json',
                    },
                    body: formData,
                });

                handleResponse(response, response.status !== 204);
            }

        }

        const getPkmn = async (getPkmnForm) =>
        {
            const url = '/getPokemon';
            const method = document.querySelector('#getPkmnMethodSelect').value;

            let response = await fetch(url, {
                method,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(handleResponse(response, method === 'get'));
        }

        const init = () =>
        {
            const getPkmnForm = document.querySelector('#getPkmnForm');
            const getAllPkmnForm = document.querySelector('#getAllPkmnForm');

            document.querySelector("#getPkmnSubmit").addEventListener('submit', getPkmn);
            document.querySelector("#getPkmnMethodSelect").addEventListener('change', updateMethod);
        }

        window.onload = init;
    </script>
</head>

<body>

        <form id="getPkmnForm" action="/getPokemon">
            <label for="id">Pokemon Id: </label>

            <input type="submit" class="submit" value="Submit" />

    <hr />
